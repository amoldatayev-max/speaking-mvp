<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speaking MVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#1A0A10;
  --btn:#6B1328;
  --accent:#E8415E;
  --text:#F5E6EA;
  --muted:rgba(245,230,234,0.45);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:90%;
  max-width:600px;
  text-align:center;
}

.phrase-wrap{
  min-height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:48px;
}

.phrase{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,6vw,46px);
  font-style:italic;
  line-height:1.4;
}

.phrase.empty{
  font-family:'DM Mono',monospace;
  font-size:13px;
  letter-spacing:.18em;
  color:var(--muted);
}

.btn{
  width:200px;
  height:200px;
  border-radius:50%;
  border:2px solid transparent;
  background:var(--btn);
  color:var(--text);
  font-size:12px;
  letter-spacing:.22em;
  cursor:pointer;
  transition:background 0.2s ease, transform 0.1s ease;
  -webkit-tap-highlight-color:transparent;
}

.btn.active{
  background:var(--accent);
  animation:pulse 1.4s ease-in-out infinite;
}

.btn:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:6px;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}

.status{
  margin-top:32px;
  font-size:10px;
  letter-spacing:.22em;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="container">

  <div
    class="phrase-wrap"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    <div id="phrase" class="phrase empty">TAP TO SPEAK</div>
  </div>

  <button
    id="btn"
    class="btn"
    aria-label="Tap to start speaking"
  >SPEAK</button>

  <div
    id="status"
    class="status"
    aria-live="assertive"
    aria-atomic="true"
  >IDLE</div>

</div>

<script>
const phraseEl = document.getElementById("phrase");
const btn      = document.getElementById("btn");
const statusEl = document.getElementById("status");

let mediaRecorder  = null;
let audioChunks    = [];
let recording      = false;
let stream         = null;

/* ─── SPEECH SYNTHESIS (fallback for status messages) ─────── */

let preferredVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  preferredVoice =
    voices.find(v => v.lang === "en-US" && v.localService) ||
    voices.find(v => v.lang.startsWith("en") && v.localService) ||
    voices.find(v => v.lang === "en-US") ||
    voices.find(v => v.lang.startsWith("en")) ||
    null;
}

loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speakSynthesis(text) {
  return new Promise((resolve) => {
    speechSynthesis.cancel();
    setTimeout(() => {
      const utter   = new SpeechSynthesisUtterance(text);
      utter.lang    = "en-US";
      utter.rate    = 0.92;
      utter.pitch   = 1;
      if (preferredVoice) utter.voice = preferredVoice;
      utter.onend   = () => resolve();
      utter.onerror = () => resolve();
      speechSynthesis.speak(utter);
    }, 120);
  });
}

/* ─── AUDIO PLAYBACK (for OpenAI TTS reply) ───────────────── */

function playBase64Audio(base64) {
  return new Promise((resolve) => {
    const audio = new Audio("data:audio/mp3;base64," + base64);
    audio.onended  = () => resolve();
    audio.onerror  = () => resolve();

    // iOS Safari requires play() inside user gesture chain
    const playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => resolve());
    }
  });
}

/* ─── KARAOKE DISPLAY ──────────────────────────────────────── */

function showKaraoke(text) {
  const lines = text.split("\n").filter(l => l.trim());
  phraseEl.innerHTML = "";
  phraseEl.className = "phrase";

  lines.forEach((line, i) => {
    const span = document.createElement("span");
    span.textContent  = line;
    span.style.cssText = "display:block;opacity:0;transition:opacity 0.4s ease;";
    phraseEl.appendChild(span);
    setTimeout(() => { span.style.opacity = "1"; }, i * 600);
  });
}

/* ─── UI HELPERS ───────────────────────────────────────────── */

function setStatus(text) {
  statusEl.textContent = text;
}

function setRecording(active) {
  recording = active;
  btn.classList.toggle("active", active);
  btn.setAttribute("aria-label", active ? "Tap to stop" : "Tap to start speaking");
  btn.textContent = active ? "STOP" : "SPEAK";
}

/* ─── MAIN PIPELINE ────────────────────────────────────────── */

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    console.error(err);
    setStatus("IDLE");
    phraseEl.className   = "phrase empty";
    phraseEl.textContent = "MICROPHONE BLOCKED";
    await speakSynthesis("Microphone access was denied. Please allow microphone and try again.");
    return;
  }

  audioChunks = [];

  // Pick best supported mime type
  const mimeType = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/ogg;codecs=opus",
    "audio/mp4",
  ].find(m => MediaRecorder.isTypeSupported(m)) || "";

  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {
    // Stop all tracks to release mic indicator
    stream.getTracks().forEach(t => t.stop());

    const blob     = new Blob(audioChunks, { type: mimeType || "audio/webm" });
    const fileExt  = mimeType.includes("mp4") ? "m4a" : "webm";

    if (blob.size < 1000) {
      setStatus("IDLE");
      phraseEl.className   = "phrase empty";
      phraseEl.textContent = "TRY AGAIN";
      await speakSynthesis("I didn't catch that. Please try again.");
      return;
    }

    setStatus("PROCESSING");
    await speakSynthesis("Processing your answer.");

    try {
      const formData = new FormData();
      formData.append("audio", blob, `recording.${fileExt}`);

      const response = await fetch("/api/ai", {
        method: "POST",
        body: formData,
      });

      if (!response.ok) throw new Error("Server error");

      const data  = await response.json();
      const reply = data.reply || "Okay. Say it again.";

      showKaraoke(reply);

      if (data.audio) {
        await playBase64Audio(data.audio);
      } else {
        await speakSynthesis(reply);
      }

    } catch (err) {
      console.error(err);
      phraseEl.className   = "phrase empty";
      phraseEl.textContent = "TRY AGAIN";
      await speakSynthesis("Something went wrong. Please try again.");
    } finally {
      setStatus("IDLE");
    }
  };

  mediaRecorder.start();
  setRecording(true);
  setStatus("LISTENING");
  await speakSynthesis("Listening.");
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
  setRecording(false);
  setStatus("PROCESSING");
}

/* ─── BUTTON ───────────────────────────────────────────────── */

btn.addEventListener("click", async () => {
  if (!recording) {
    phraseEl.textContent = "";
    phraseEl.className   = "phrase";
    await startRecording();
  } else {
    stopRecording();
  }
});

/* ─── PAGE LOAD ────────────────────────────────────────────── */

window.addEventListener("load", () => {
  setTimeout(() => {
    speakSynthesis("Hello. Tap the button and start speaking.");
  }, 800);
});
</script>
<script src="frontend/voiceStateManager.js"></script>
</body>
</html>
