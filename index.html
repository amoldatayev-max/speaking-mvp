<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speaking MVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#1A0A10;
  --btn:#6B1328;
  --accent:#E8415E;
  --text:#F5E6EA;
  --muted:rgba(245,230,234,0.45);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:90%;
  max-width:600px;
  text-align:center;
}

.phrase-wrap{
  min-height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:48px;
}

.phrase{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,6vw,46px);
  font-style:italic;
  line-height:1.4;
}

.phrase.empty{
  font-family:'DM Mono',monospace;
  font-size:13px;
  letter-spacing:.18em;
  color:var(--muted);
}

.btn{
  width:200px;
  height:200px;
  border-radius:50%;
  border:2px solid transparent;
  background:var(--btn);
  color:var(--text);
  font-size:12px;
  letter-spacing:.22em;
  cursor:pointer;
  transition: background 0.2s ease, transform 0.1s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn.active{
  background:var(--accent);
  animation: pulse 1.4s ease-in-out infinite;
}

.btn:focus-visible{
  outline: 2px solid var(--accent);
  outline-offset: 6px;
}

@keyframes pulse {
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}

.status{
  margin-top:32px;
  font-size:10px;
  letter-spacing:.22em;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="container">

  <div
    class="phrase-wrap"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    <div id="phrase" class="phrase empty">TAP TO SPEAK</div>
  </div>

  <button
    id="btn"
    class="btn"
    aria-label="Tap to start speaking"
  >SPEAK</button>

  <div
    id="status"
    class="status"
    aria-live="assertive"
    aria-atomic="true"
  >IDLE</div>

</div>

<script>
/* ─── SPEECH SYNTHESIS ─────────────────────────────────────── */

let preferredVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  preferredVoice =
    voices.find(v => v.lang === "en-US" && v.localService) ||
    voices.find(v => v.lang.startsWith("en") && v.localService) ||
    voices.find(v => v.lang === "en-US") ||
    voices.find(v => v.lang.startsWith("en")) ||
    null;
}

loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  return new Promise((resolve) => {
    speechSynthesis.cancel();

    // Safari needs a tiny delay after cancel
    setTimeout(() => {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang  = "en-US";
      utter.rate  = 0.92;
      utter.pitch = 1;
      if (preferredVoice) utter.voice = preferredVoice;
      utter.onend = () => resolve();
      utter.onerror = () => resolve();
      speechSynthesis.speak(utter);
    }, 120);
  });
}

/* ─── KARAOKE DISPLAY ──────────────────────────────────────── */

function showKaraoke(text) {
  const lines = text.split("\n").filter(l => l.trim());
  phraseEl.innerHTML = "";
  phraseEl.className = "phrase";

  lines.forEach((line, i) => {
    const span = document.createElement("span");
    span.textContent = line;
    span.style.cssText = "display:block;opacity:0;transition:opacity 0.4s ease;";
    phraseEl.appendChild(span);
    setTimeout(() => { span.style.opacity = "1"; }, i * 600);
  });
}

/* ─── SPEECH RECOGNITION ───────────────────────────────────── */

const phraseEl  = document.getElementById("phrase");
const btn       = document.getElementById("btn");
const statusEl  = document.getElementById("status");

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  phraseEl.textContent = "Speech not supported";
  statusEl.textContent = "UNSUPPORTED";
  btn.disabled = true;
  speak("Sorry, speech recognition is not supported in this browser.");
  throw new Error("SpeechRecognition not supported");
}

const recognition       = new SpeechRecognition();
recognition.lang        = "en-US";
recognition.interimResults = true;
recognition.continuous  = false;

let finalTranscript = "";
let listening       = false;
let endFired        = false; // Safari onend double-fire guard

function setStatus(text) {
  statusEl.textContent = text;
}

function setListening(active) {
  listening = active;
  btn.classList.toggle("active", active);
  btn.setAttribute("aria-label", active ? "Tap to stop" : "Tap to start speaking");
}

/* Live transcription */
recognition.onresult = (e) => {
  let interim = "";
  for (let i = e.resultIndex; i < e.results.length; i++) {
    const t = e.results[i][0].transcript;
    if (e.results[i].isFinal) finalTranscript += t;
    else interim += t;
  }
  phraseEl.className = "phrase";
  phraseEl.textContent = finalTranscript + interim;
};

/* After speech ends */
recognition.onend = async () => {
  if (endFired) return;   // Safari double-fire guard
  endFired = true;

  if (!finalTranscript.trim()) {
    setListening(false);
    setStatus("IDLE");
    return;
  }

  setListening(false);
  setStatus("PROCESSING");
  await speak("Processing your answer.");

  try {
    const response = await fetch("/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: finalTranscript })
    });

    if (!response.ok) throw new Error("Server error");

    const data  = await response.json();
    const reply = data.reply || "Okay. Say it again.";

    showKaraoke(reply);
    await speak(reply);

  } catch (err) {
    console.error(err);
    phraseEl.className    = "phrase empty";
    phraseEl.textContent  = "TRY AGAIN";
    await speak("Something went wrong. Please try again.");
  } finally {
    finalTranscript = "";
    setStatus("IDLE");
  }
};

recognition.onerror = async (e) => {
  console.error("Recognition error:", e.error);
  setListening(false);
  setStatus("IDLE");

  if (e.error === "not-allowed") {
    phraseEl.textContent = "MICROPHONE BLOCKED";
    await speak("Microphone access was denied. Please allow microphone and try again.");
  } else {
    phraseEl.className   = "phrase empty";
    phraseEl.textContent = "TRY AGAIN";
    await speak("Something went wrong. Please try again.");
  }
  finalTranscript = "";
};

/* ─── BUTTON ───────────────────────────────────────────────── */

btn.addEventListener("click", async () => {
  if (!listening) {
    endFired        = false;
    finalTranscript = "";
    phraseEl.textContent = "";
    phraseEl.className   = "phrase";
    setListening(true);
    setStatus("LISTENING");
    await speak("Listening.");

    try {
      recognition.start();
    } catch (err) {
      console.error(err);
    }
  } else {
    recognition.stop();
  }
});

/* ─── PAGE LOAD ────────────────────────────────────────────── */

window.addEventListener("load", () => {
  // Delay slightly — Safari blocks synthesis before user gesture
  setTimeout(() => {
    speak("Hello. Tap the button and start speaking.");
  }, 800);
});
</script>
</body>
</html>
